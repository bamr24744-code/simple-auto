<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=900, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="تطبيق بسيط للراديو، التقويم الهجري، ومواقيت الصلاة">
    <meta name="color-scheme" content="light dark">
    <title>📻 Simple Desktop</title>
    
    <!-- ✅ تهيئة السمة لمنع الوميض (قبل تحميل أي محتوى) -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'light') document.body.classList.add('light-mode');
        })();
    </script>

    <!-- 🎨 أنماط مدمجة ومحسّنة لسطح المكتب -->
    <style>
    /* ========== المتغيرات الأساسية ========== */
    :root {
        /* الألوان - الوضع الداكن */
        --bg-primary: #121212; --bg-secondary: #1a1a1a; --bg-tertiary: #222222;
        --text-primary: #e9ec0e; --text-secondary: #16dddd; --text-dim: #adb5bd; --text-error: #ff6b6b;
        --accent-gold: #91f878; --accent-green: #48f115; --accent-blue: #238d9b; --accent-pink: #d83bbe;
        --accent-danger: #c51481; --accent-warning: #ff9800;
        --border-color: #333333; --border-radius: 12px; --shadow: 0 4px 12px rgba(0,0,0,0.4);
        --trans: 0.25s ease;
        
        /* 🖥️ أبعاد مخصصة لسطح المكتب */
        --app-width: 480px;
        --app-height: 600px;
        --frame-padding: 18px;
        --btn-size: 58px;
        --font-base: 1.1rem;
        --clock-size: 3.2rem;
    }

    /* الوضع الفاتح */
    :root[data-theme="light"], body.light-mode {
        --bg-primary: #f8f9fa; --bg-secondary: #ffffff; --bg-tertiary: #e9ecef;
        --text-primary: #1a1a2e; --text-secondary: #0d6efd; --text-dim: #6c757d; --text-error: #dc3545;
        --accent-gold: #28a745; --accent-green: #198754; --accent-blue: #0d6efd; --accent-pink: #d63384;
        --accent-danger: #dc3545; --accent-warning: #fd7e14; --border-color: #dee2e6;
        --shadow: 0 4px 12px rgba(0,0,0,0.15);
    }

    /* ========== إعادة تعيين أساسية ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
        height: 100vh; 
        overflow: hidden; 
        background: var(--bg-primary); 
        color: var(--text-primary);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: var(--font-base);
        transition: background var(--trans), color var(--trans);
    }

    /* ========== الشريط العلوي ========== */
    .nav-bar {
        flex-shrink: 0; 
        height: 56px;
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 8px;
        padding: 0 12px; 
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        transition: background var(--trans);
    }
    .nav-bar button {
        padding: 0 14px; 
        height: 40px;
        background: transparent; 
        border: 1px solid var(--border-color);
        color: var(--text-secondary); 
        border-radius: 8px;
        font-size: 0.95rem; 
        cursor: pointer;
        transition: all var(--trans); 
        white-space: nowrap;
    }
    .nav-bar button:hover, .nav-bar button.active {
        background: var(--bg-tertiary); 
        color: var(--text-primary);
        border-color: var(--accent-blue);
        transform: translateY(-1px);
    }

    /* ========== منطقة المحتوى ========== */
    .content {
        flex: 1; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        padding: 12px; 
        overflow: hidden;
        width: 100%;
        max-width: var(--app-width);
        margin: 0 auto;
    }

    /* ========== الفريمات ========== */
    .frame {
        width: 100%; 
        height: 100%;
        display: none; 
        flex-direction: column; 
        align-items: center; 
        justify-content: flex-start;
        padding: var(--frame-padding); 
        gap: 14px;
        background: var(--bg-secondary); 
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius); 
        box-shadow: var(--shadow);
        transition: background var(--trans), border-color var(--trans);
        overflow-y: auto;
    }
    .frame.active { display: flex !important; }

    /* ========== النصوص والعناوين ========== */
    .clock-style {
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: var(--clock-size);
        font-weight: 800; 
        color: var(--text-primary); 
        text-align: center; 
        margin: 4px 0;
        font-variant-numeric: tabular-nums; 
        letter-spacing: 2px;
    }
    .date-style { 
        font-size: 1.05rem; 
        color: var(--text-secondary); 
        text-align: center; 
        margin: 4px 0; 
    }
    .gold-text { 
        color: var(--accent-gold); 
        font-weight: 700; 
        font-size: 1.3rem; 
        text-align: center; 
    }

    /* ========== صناديق المعلومات ========== */
    .info-box {
        background: var(--bg-tertiary); 
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 12px 16px;
        margin: 6px 0;
        width: 100%;
        max-width: 400px;
        transition: all var(--trans);
    }
    .info-box p { 
        margin: 5px 0; 
        font-size: 1rem; 
        color: var(--text-dim); 
        line-height: 1.5; 
    }
    .info-box b { color: var(--text-primary); font-weight: 600; }

    /* ========== المؤقت ========== */
    #timer-setup-box {
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 10px;
        padding: 10px 14px; 
        background: var(--bg-tertiary);
        border-radius: 10px; 
        transition: background var(--trans);
    }
    #timer-input {
        width: 75px; 
        padding: 6px 8px;
        font-size: 2rem; 
        font-family: 'Consolas', monospace;
        text-align: center; 
        background: var(--bg-primary); 
        border: 2px solid var(--border-color);
        color: var(--accent-pink); 
        border-radius: 8px; 
        transition: all var(--trans);
    }
    #timer-input:focus { 
        outline: none; 
        border-color: var(--accent-blue); 
        box-shadow: 0 0 0 3px rgba(13,110,253,0.3); 
    }

    /* ========== أزرار التحكم ========== */
    .control-bar { 
        display: flex; 
        justify-content: center; 
        flex-wrap: wrap; 
        gap: 12px; 
        width: 100%; 
        margin-top: 8px;
    }
    .control-bar button {
        width: var(--btn-size); 
        height: var(--btn-size);
        border: none; 
        border-radius: 14px; 
        font-size: 1.6rem;
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        box-shadow: var(--shadow); 
        transition: transform 0.15s, box-shadow 0.15s;
    }
    .control-bar button:hover:not(:disabled) { 
        transform: translateY(-2px) scale(1.05); 
        box-shadow: 0 6px 16px rgba(0,0,0,0.5);
    }
    .control-bar button:disabled { 
        opacity: 0.5; 
        cursor: not-allowed; 
        transform: none;
    }
    .btn-danger { background: var(--accent-danger); color: #fff; }
    .btn-safe { background: var(--accent-blue); color: #fff; }
    .btn-warning { background: var(--accent-warning); color: #fff; }

    /* ========== الراديو ========== */
    #station-container {
        width: 100%;
        max-width: 340px;
        margin: 4px auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .station-label {
        font-size: 0.95rem;
        color: var(--text-secondary);
        font-weight: 600;
        text-align: right;
        padding-right: 4px;
    }
    #station-select {
        width: 100%;
        size: 4; /* ✅ يعرض 4 عناصر مع سكرول داخلي */
        padding: 8px 12px;
        font-size: 1rem;
        background: var(--bg-tertiary);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        cursor: pointer;
        transition: all var(--trans);
        scrollbar-width: thin;
        scrollbar-color: var(--accent-blue) transparent;
    }
    #station-select::-webkit-scrollbar { width: 6px; }
    #station-select::-webkit-scrollbar-track { background: transparent; }
    #station-select::-webkit-scrollbar-thumb {
        background: var(--accent-blue);
        border-radius: 3px;
    }
    #station-select option {
        padding: 6px 8px;
        background: var(--bg-tertiary);
        color: var(--text-primary);
    }
    #station-select:focus {
        outline: none;
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 2px rgba(13,110,253,0.3);
    }
    
    #radio-player {
        width: min(95%, 360px);
        height: 52px;
        border-radius: 10px;
        margin: 4px auto;
        filter: var(--radio-filter, invert(85%));
        transition: filter var(--trans);
    }
    :root[data-theme="light"] #radio-player,
    body.light-mode #radio-player { filter: none !important; }
    
    #status { 
        font-size: 1rem; 
        color: var(--text-dim); 
        text-align: center; 
        min-height: 1.4em; 
        margin: 2px 0;
    }
    #current-station {
        font-size: 0.9rem;
        color: var(--text-secondary);
        text-align: center;
        font-weight: 600;
        margin: 0;
    }

    /* ========== التقويم ========== */
    #date-frame .today-box {
        text-align: center;
        padding: 8px 0;
        margin-bottom: 10px;
        border-bottom: 1px dashed var(--border-color);
        width: 100%;
        max-width: 400px;
    }
    #gregorian-date-main {
        font-size: 1.1rem;
        color: var(--text-secondary);
        margin: 0 0 6px 0;
        line-height: 1.4;
    }
    #hijri-today {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent-gold);
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    #next-month b, #moon-days b { color: var(--accent-gold); }
    #moon-days b {
        display: inline-block;
        min-width: 26px;
        text-align: center;
        background: var(--accent-gold);
        color: #121212;
        padding: 2px 6px;
        border-radius: 4px;
        margin: 0 3px;
        font-weight: 700;
    }

    /* ========== مواقيت الصلاة ========== */
    #prayer-frame { padding-top: 10px !important; }
    #country-select {
        width: min(200px, 90%);
        padding: 8px 12px;
        font-size: 0.95rem;
        background: var(--bg-tertiary);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        cursor: pointer;
        margin: 4px 0 10px;
        transition: all var(--trans);
    }
    #country-select:focus {
        outline: none;
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 2px rgba(13,110,253,0.3);
    }
    #prayer-times { 
        width: 100%; 
        max-width: 360px; 
    }
    #prayer-times > div {
        display: flex; 
        justify-content: space-between; 
        padding: 6px 0;
        border-bottom: 1px dashed var(--border-color);
        font-size: 1.1rem;
    }
    #prayer-times > div:last-child { border-bottom: none; }
    #prayer-times span:last-child { 
        color: var(--accent-green); 
        font-weight: 700; 
        font-family: 'Consolas', monospace; 
    }
    #prayer-status {
        font-size: 0.9rem;
        color: var(--text-dim);
        text-align: center;
        margin-top: 8px;
    }

    /* ========== عناصر مساعدة ========== */
    .visually-hidden { 
        position: absolute; 
        width: 1px; 
        height: 1px; 
        padding: 0; 
        margin: -1px; 
        overflow: hidden; 
        clip: rect(0,0,0,0); 
        border: 0; 
    }
    
    /* ========== تجاوب اختياري للشاشات الكبيرة جداً ========== */
    @media (min-width: 1200px) {
        .content { max-width: 520px; }
        .frame { max-width: 480px; }
    }
    </style>
</head>
<body>

    <!-- 🧭 شريط التنقل -->
    <nav class="nav-bar" role="navigation">
        <button onclick="showFrame('radio-frame')" data-action="nav-radio">📻 راديو</button>
        <button onclick="showFrame('date-frame')" data-action="nav-date">📅 تقويم</button>
        <button onclick="showFrame('prayer-frame')" data-action="nav-prayer">🕋 مواقيت</button>
        <button onclick="showFrame('power-frame')" data-action="nav-power" class="active">⏰ منبه</button>
        <button id="theme-toggle" data-action="toggle-theme">🌙 وضع ليلي</button>
    </nav>

    <main class="content" role="main">

        <!-- 📻 فريم الراديو -->
        <div id="radio-frame" class="frame">
            <h4 style="margin:0 0 8px 0; color:var(--text-secondary);">📻 إذاعة مباشرة</h4>
            
            <div id="station-container">
                <label for="station-select" class="station-label">📻 اختر المحطة:</label>
                <select id="station-select" size="2"></select>
            </div>
            
            <audio id="radio-player" controls preload="none" aria-label="مشغل الراديو">
                <source src="" type="audio/mp3">
                متصفحك لا يدعم عنصر الصوت.
            </audio>
            
            <p id="status" role="status" aria-live="polite">جاهز للتشغيل</p>
            <p id="current-station"></p>
            
            <script src="radio.js"></script>
        </div>

        <!-- 📅 فريم التقويم -->
        <div id="date-frame" class="frame" aria-labelledby="calendar-title">
            <h4 id="calendar-title" class="visually-hidden">التقويم الهجري والميلادي</h4>
            
            <div class="today-box">
                <h2 id="gregorian-date-main" class="date-style" aria-live="polite"></h2>
                <p id="hijri-today" class="gold-text" aria-live="polite">جاري التحميل...</p>
            </div>
            
            <div class="info-box" role="region" aria-label="أحداث قمرية">
                <p id="next-month" aria-live="polite"></p>
                <p id="moon-days" aria-live="polite"></p>
            </div>
            
            <button onclick="if(typeof refreshCalendar==='function')refreshCalendar()" 
                    style="margin-top:8px;padding:6px 14px;font-size:0.9rem;background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:6px;color:var(--text-secondary);cursor:pointer;">
                🔄 تحديث
            </button>
        </div>

        <!-- ⚙️ فريم التحكم (الافتراضي) -->
        <div id="power-frame" class="frame active">
            <h4 class="visually-hidden">لوحة التحكم</h4>
            
            <div style="width:100%; display:flex; flex-direction:column; align-items:center;">
                <div id="main-view" class="clock-style">00:00:00</div>
                <div id="shutdown-timer-view" class="clock-style" style="display:none; color:#64c8f0;"></div>
                <div id="negative-timer" class="clock-style" style="display:none; color:#fc9faa;"></div>
                
                <div id="timer-setup-box">
                    <label for="timer-input" style="font-size:0.9rem; color:var(--text-dim);">الدقائق:</label>
                    <input type="number" id="timer-input" value="60" min="5" max="480" readonly>
                </div>
                <div id="gregorian-date-control" class="date-style"></div>
            </div>

            <div class="control-bar" role="group">
                <button id="btn-timer-up" onclick="changeTimer(5)" title="زيادة 5 دقائق">▲</button>
                <button id="btn-timer-down" onclick="changeTimer(-5)" title="تقليل 5 دقائق">▼</button>
                <button id="btn-start-timer" onclick="systemAction('shutdown')" 
                        class="btn-danger" title="بدء العد التنازلي">⏱️</button>
                <button id="btn-cancel-timer" onclick="systemAction('cancel')" 
                        class="btn-safe" disabled title="إلغاء">🛡️</button>
                <button id="btn-monitor-off" onclick="systemAction('monitor-off')" 
                        class="btn-warning" title="إطفاء الشاشة">🖥️</button>
            </div>
        </div>

        <!-- 🕌 فريم الصلاة -->
        <div id="prayer-frame" class="frame">
            <h4 style="margin:0 0 10px 0; text-align:center; color:var(--accent-pink);">🕌 مواقيت الصلاة</h4>
            
            <select id="country-select" aria-label="اختر الدولة">
                <option value="Egypt" selected>🇪🇬 مصر</option>
                <option value="Palestine">🇵🇸 فلسطين</option>
                <option value="Saudi Arabia">🇸🇦 السعودية</option>
                <option value="Jordan">🇯🇴 الأردن</option>
                <option value="UAE">🇦🇪 الإمارات</option>
                <option value="Kuwait">🇰🇼 الكويت</option>
                <option value="Qatar">🇶🇦 قطر</option>
                <option value="Bahrain">🇧🇭 البحرين</option>
                <option value="Oman">🇴🇲 عمان</option>
                <option value="Lebanon">🇱🇧 لبنان</option>
                <option value="Iraq">🇮🇶 العراق</option>
                <option value="Algeria">🇩🇿 الجزائر</option>
                <option value="Morocco">🇲🇦 المغرب</option>
                <option value="Tunisia">🇹🇳 تونس</option>
                <option value="Sudan">🇸🇩 السودان</option>
            </select>
            
            <div id="prayer-times">
                <div><span>الفجر:</span><span id="fajr">--:--</span></div>
                <div><span>الظهر:</span><span id="dhuhr">--:--</span></div>
                <div><span>العصر:</span><span id="asr">--:--</span></div>
                <div><span>المغرب:</span><span id="maghrib">--:--</span></div>
                <div><span>العشاء:</span><span id="isha">--:--</span></div>
            </div>
            <div id="prayer-status"></div>
        </div>

    </main>

    <!-- ✅ السكربتات مرتبة ومنظّمة -->
    <!-- ملاحظة: main.js لـ Electron لا يُحمّل في HTML، فقط في عملية Node -->
    <script src="renderer.js"></script>
    <script src="prayer.js"></script>
    <script src="calendar.js"></script>
    
    <!-- 🎯 تهيئة نهائية بسيطة -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // تحديث نص زر السمة حسب الحالة المحفوظة
            const themeBtn = document.getElementById('theme-toggle');
            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            if (themeBtn) {
                themeBtn.innerText = isDark ? '☀️ وضع نهاري' : '🌙 وضع ليلي';
            }
            
            // تحديث عنوان الصفحة حسب الفريم النشط
            const titles = {
                'radio-frame': '📻 راديو',
                'date-frame': '📅 تقويم',
                'prayer-frame': '🕌 مواقيت',
                'power-frame': '⏰ منبه'
            };
            const currentFrame = document.querySelector('.frame.active')?.id;
            if (currentFrame && titles[currentFrame]) {
                document.title = titles[currentFrame];
            }
            
            console.log('✅ التطبيق جاهز لسطح المكتب');
        });
    </script>

</body>
</html>
